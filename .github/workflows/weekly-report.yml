name: MitScope Report

on:
  schedule:
    # Daily at 00:35 UTC — 35-min buffer after midnight for late trace ingestion
    - cron: '35 0 * * *'
    # Daily at 07:00 UTC — Sales page update (after overnight eval enhancement)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      period:
        description: 'Report period'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
      phase:
        description: 'Report phase'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - reports-only
          - sales-only

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine report period and phase
        id: period
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "period=${{ github.event.inputs.period }}" >> "$GITHUB_OUTPUT"
            echo "phase=${{ github.event.inputs.phase }}" >> "$GITHUB_OUTPUT"
          else
            # Cron: Sunday = weekly, all other days = daily
            DOW=$(date -u +%u)
            if [ "$DOW" = "1" ]; then
              echo "period=weekly" >> "$GITHUB_OUTPUT"
            else
              echo "period=daily" >> "$GITHUB_OUTPUT"
            fi
            # Determine phase from cron schedule
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 5 ]; then
              echo "phase=sales-only" >> "$GITHUB_OUTPUT"
            else
              echo "phase=full" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate report
        env:
          LANGFUSE_HOST: https://us.cloud.langfuse.com
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.AI_SERVICES_PAT }}
          REPORT_BASE_URL: https://disasterpro.github.io/mit-scope-reports
          REPORT_PERIOD: ${{ steps.period.outputs.period }}
          REPORT_PHASE: ${{ steps.period.outputs.phase }}
        run: python -m src

      - name: Commit markdown docs
        if: steps.period.outputs.phase != 'sales-only'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage docs + reports (both generated by the report step)
          git add docs/ reports/
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update ${{ steps.period.outputs.period }} report docs [skip ci]"
          # Pull latest with merge strategy -- Trace Eval workflow commits to
          # scope-eval-all-runs.md every 30 min, so rebase often conflicts.
          # Use -X ours to auto-resolve: our freshly-generated file wins.
          git pull --no-rebase -X ours origin main
          git push

      - name: Sync docs to ai-services repo
        continue-on-error: true
        env:
          AI_SERVICES_PAT: ${{ secrets.AI_SERVICES_PAT }}
        if: env.AI_SERVICES_PAT != '' && steps.period.outputs.phase != 'sales-only'
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            "https://x-access-token:${AI_SERVICES_PAT}@github.com/EncircleInc/ai-services.git" \
            /tmp/ai-services
          cd /tmp/ai-services
          git sparse-checkout set services/mitigation-scope/joe/docs

          cp "${{ github.workspace }}/docs/scope-usage.md" \
             services/mitigation-scope/joe/docs/scope-usage.md
          cp "${{ github.workspace }}/docs/scope-costs.md" \
             services/mitigation-scope/joe/docs/scope-costs.md
          cp "${{ github.workspace }}/docs/scope-errors.md" \
             services/mitigation-scope/joe/docs/scope-errors.md
          cp "${{ github.workspace }}/docs/scope-eval-all-runs.md" \
             services/mitigation-scope/joe/docs/scope-eval-all-runs.md 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add services/mitigation-scope/joe/docs/scope-*.md
          git diff --cached --quiet || {
            git commit -m "Update scope reports from automated pipeline [skip ci]"
            git push
          }


      - name: Sync docs to joe-sandbox repo
        continue-on-error: true
        env:
          AI_SERVICES_PAT: ${{ secrets.AI_SERVICES_PAT }}
        if: env.AI_SERVICES_PAT != '' && steps.period.outputs.phase != 'sales-only'
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            "https://x-access-token:${AI_SERVICES_PAT}@github.com/EncircleInc/joe-sandbox.git" \
            /tmp/joe-sandbox
          cd /tmp/joe-sandbox
          git sparse-checkout set docs

          cp "${{ github.workspace }}/docs/scope-usage.md" docs/scope-usage.md
          cp "${{ github.workspace }}/docs/scope-costs.md" docs/scope-costs.md
          cp "${{ github.workspace }}/docs/scope-errors.md" docs/scope-errors.md
          cp "${{ github.workspace }}/docs/scope-eval-all-runs.md" docs/scope-eval-all-runs.md 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/scope-*.md
          git diff --cached --quiet || {
            git commit -m "Mirror scope reports from DisasterPro [skip ci]"
            git push
          }

      - name: Commit HTML reports (sales-only)
        if: steps.period.outputs.phase == 'sales-only'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update Sales page [skip ci]"
          git pull --no-rebase -X ours origin main
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          keep_files: true

